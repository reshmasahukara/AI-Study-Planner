<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Schedule | PlanIt AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0c10; color: #f5f5f7; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; }
        .text-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-link.active { background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; color: #3b82f6; }
        .timeline-line { background: linear-gradient(to bottom, #3b82f6 0%, #8b5cf6 50%, rgba(255, 255, 255, 0.05) 100%); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-[#12141c] border-r border-white/5 flex flex-col p-6 sidebar sticky top-0 hidden md:flex">
        <div class="flex items-center gap-3 mb-10">
            <span class="text-2xl text-gradient"><i class="fas fa-brain"></i></span>
            <span class="text-xl font-bold font-poppins">PlanIt AI</span>
        </div>
        
        <nav class="flex-1 space-y-2">
            <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">
                <i class="fas fa-chart-pie w-5"></i> Dashboard
            </a>
            <a href="planner.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">
                <i class="fas fa-magic w-5"></i> Create Plan
            </a>
            <a href="schedule.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">
                <i class="fas fa-calendar-alt w-5"></i> View Schedule
            </a>
            <a href="analytics.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">
                <i class="fas fa-chart-line w-5"></i> Analytics
            </a>
            <a href="goals.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">
                <i class="fas fa-bullseye w-5"></i> Goals
            </a>
            <a href="chat.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">
                <i class="fas fa-robot w-5"></i> AI Study Assistant
            </a>
            <a href="chat.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">
                <i class="fas fa-robot w-5"></i> AI Study Assistant
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8">
        <div class="max-w-3xl mx-auto">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                <div>
                    <h1 class="text-3xl font-bold font-poppins mb-2 text-gradient">Your Daily Schedule 🗓️</h1>
                    <p class="text-gray-400" id="current-date">Today's AI optimized plan</p>
                </div>
                <button onclick="clearSchedule()" class="text-gray-500 hover:text-red-400 transition text-sm font-semibold flex items-center gap-2">
                    <i class="fas fa-trash-alt"></i> Clear All
                </button>
            </header>

            <div id="schedule-container" class="space-y-6 relative">
                <!-- Vertical Line -->
                <div class="absolute left-[44px] md:left-[44px] top-4 bottom-4 w-1 timeline-line z-0 rounded-full opacity-20"></div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden text-center py-20 glass-card">
                    <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-calendar-times text-4xl text-gray-700"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2">No schedule yet.</h3>
                    <p class="text-gray-500 mb-8 max-w-xs mx-auto text-sm">Our AI hasn't generated a routine for you yet. Start by defining your study goals.</p>
                    <a href="planner.html" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold transition inline-block">
                        <i class="fas fa-sparkles mr-2"></i> Create Study Plan
                    </a>
                </div>

                <!-- Dynamic Items -->
                <div id="schedule-list" class="space-y-8 relative z-10 text"></div>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            renderSchedule();
        });

        function renderSchedule() {
            const schedule = storage.getSchedule();
            const list = document.getElementById('schedule-list');
            const emptyState = document.getElementById('empty-state');

            if (!schedule || schedule.length === 0) {
                emptyState.classList.remove('hidden');
                list.innerHTML = '';
                return;
            }

            emptyState.classList.add('hidden');
            list.innerHTML = schedule.map(item => `
                <div class="relative pl-20 md:pl-24 group">
                    <!-- Marker -->
                    <div class="absolute left-8 md:left-8 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full border-4 border-[#0a0c10] z-20 flex items-center justify-center
                        ${item.status === 'completed' ? 'bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.4)]' : 'bg-[#1a1c26] text-blue-400 border-white/10'}">
                        ${item.status === 'completed' ? '<i class="fas fa-check text-xs text-white"></i>' : '<i class="fas fa-circle text-[8px]"></i>'}
                    </div>

                    <!-- Time Label -->
                    <div class="absolute left-0 top-1/2 -translate-y-1/2 text-[10px] md:text-xs font-bold text-gray-500 w-6 md:w-8 text-right">${item.startTime}</div>
                    
                    <div class="glass-card p-5 md:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition-all group-hover:bg-white/5 border-l-4 ${item.status === 'completed' ? 'border-l-green-600' : 'border-l-blue-600'}">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] uppercase tracking-widest px-2 py-0.5 rounded bg-blue-500/10 text-blue-400 font-extrabold">${item.category}</span>
                                <span class="text-[10px] text-gray-500 font-medium">${item.duration}h duration</span>
                            </div>
                            <h3 class="text-base md:text-lg font-bold">${item.topic}</h3>
                        </div>
                        
                        ${item.status !== 'completed' ? `
                            <button onclick="completeTask(${item.id}, ${item.duration})" class="w-full sm:w-auto bg-blue-600 hover:bg-green-600 text-white px-5 py-2 rounded-xl text-xs font-bold transition-all transform active:scale-95 shadow-lg shadow-blue-500/20">
                                <i class="fas fa-check-double mr-2"></i> Mark Done
                            </button>
                        ` : `
                            <div class="flex items-center gap-2 text-green-500 font-bold px-4 py-2 bg-green-500/10 rounded-xl text-xs">
                                <i class="fas fa-check-circle"></i> Completed
                            </div>
                        `}
                    </div>
                </div>
            `).join('');
        }

        window.completeTask = (id, duration) => {
            storage.addSession({ scheduleId: id, duration: duration });
            renderSchedule();
        };

        window.clearSchedule = () => {
            if (confirm('Clear your entire schedule? This cannot be undone.')) {
                storage.saveSchedule([]);
                renderSchedule();
            }
        };
    </script>
</body>
</html>
