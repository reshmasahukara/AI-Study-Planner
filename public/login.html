<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Study Planner</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0c10; color: #f5f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .text-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .input-dark { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; transition: all 0.2s; }
        .input-dark:focus { border-color: #3b82f6; outline: none; background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="w-full max-w-md p-6 fade-in">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 mb-4">
                <span class="text-3xl text-gradient"><i class="fas fa-brain"></i></span>
                <span class="text-2xl font-bold font-poppins">PlanIt AI</span>
            </div>
        </div>

        <div class="glass-card p-8 md:p-10">
            <h2 class="text-2xl font-bold font-poppins mb-2 text-center md:text-left">Welcome Back</h2>
            <p class="text-gray-400 text-sm mb-8 text-center md:text-left">Enter your credentials to access your dashboard.</p>

            <form action="dashboard.html" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Email Address</label>
                    <input type="email" id="login-email" placeholder="john@example.com" class="input-dark w-full px-4 py-3" required>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Password</label>
                        <a href="#" class="text-[10px] text-blue-400 font-bold hover:underline">Forgot?</a>
                    </div>
                    <input type="password" id="login-password" placeholder="••••••••" class="input-dark w-full px-4 py-3" required>
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="remember-me" class="w-4 h-4 rounded border-white/10 bg-white/5 accent-blue-600">
                        <span class="text-xs text-gray-500 group-hover:text-gray-300 transition">Remember Me</span>
                    </label>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-lg transition shadow-lg shadow-blue-600/20">
                    Login to Dashboard
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-white/5 text-center">
                <p class="text-sm text-gray-500">
                    Don't have an account? <a href="signup.html" class="text-blue-400 font-bold hover:underline">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/ui-utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
